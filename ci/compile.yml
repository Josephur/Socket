name: Compile Check

on:
  push:
    branches: [main]
    paths:
      - 'Socket.ino'
      - 'src/**'
      - 'libraries.txt'
      - '.github/workflows/compile.yml'
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Configure Arduino CLI and ESP32 platform
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries (from libraries.txt)
        run: |
          arduino-cli lib update-index
          ./scripts/install-libs.sh

      - name: Provide placeholder secrets
        run: cp src/config/Secrets.h.example src/config/Secrets.h

      - name: Compile Socket.ino
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32p4 \
            --board-options "PSRAM=enabled,FlashMode=qio,FlashSize=32M,PartitionScheme=app5M_fat24M_32MB" \
            .
